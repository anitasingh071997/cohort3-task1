<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Squid Game Landing Page</title>

  <!-- Remix Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css"
    rel="stylesheet"
  />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="main">
    <nav>

      <div class="logo">
        <img src="./images/logo-removebg-preview.png" alt="logo-image">
      </div>

      <div class="nav-links">
        <a href="#">About</a>
        <a href="#" class="active">Watch now</a>
        <a href="#">Actors</a>
        <a href="#">Contact</a>
      </div>

      <i class="ri-menu-3-line menu-icon"></i>

    </nav>

    <h1 class="bg-text-left">GAME</h1>
    <h1 class="bg-text-right">SQUID</h1>

    <div class="left">

      <div class="heading"> 
        <img src="./images/final-final-removebg-preview.png" alt="squid-game-logo">

        <p>
          Action / Thriller / Drama Series directed by Dong-hyuk Hwang
          <br>
          Season 1: 9 Episodes
        </p>

        <div class="buttons">
            <button class="play-btn">
            <i class="ri-play-circle-fill"></i>
            Play Now
            </button>

            <button class="trailer-btn">
            <i class="ri-play-mini-line"></i>
            Watch Trailer
            </button>
        </div>

      </div>

      <!-- <div class="buttons">

        <button class="play-btn">
          <i class="ri-play-circle-fill"></i>
          Play Now
        </button>

        <button class="trailer-btn">
          <i class="ri-play-mini-line"></i>
          Watch Trailer
        </button>

      </div> -->

    </div>

    <div class="scroll">
      <p>SCROLL</p>
      <div class="scroll-line"></div>
    </div>

    <img
      src="./images/Square-squid-player.webp"
      alt=""
      class="hero-img"
    >
    <div class="social">

      <i class="ri-twitter-line"></i>
      <i class="ri-instagram-line"></i>
      <i class="ri-facebook-line"></i>

    </div>
    <div class="cards-bg">
        <div class="cards">
            <div class="card">
                <img
                    src="./images/squid-game-Player.jpg"
                    alt="player-card-1"
                >
                <div class="overlay">
                    <i class="ri-play-fill"></i>
                </div>
            </div>

            <div class="card">
                <img
                    src="./images/squid-game-card.png"
                    alt="player-card-2"
                >
                <div class="overlay">
                    <i class="ri-play-fill"></i>
                </div>
            </div>

            <div class="card">
                <img
                    src="./images/player-card1.jpg"
                    alt="player-card-3"
                >
                <div class="overlay">
                    <i class="ri-play-fill"></i>
                </div>
            </div>
        </div>
    </div>

  </div>

</body>
</html>
